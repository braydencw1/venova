stages:
  - tag
  - lint
  - build
  - build_image
  - upload_nexus
  - release

variables:
  OUTPUT: "${CI_PROJECT_NAME}-linux-amd64"
  OUTPUT_AUDIO: "venova-audio-stream-linux-amd64"
  OUTPUT_WIN: "${CI_PROJECT_NAME}-windows-amd64.exe"
  OUTPUT_AUDIO_WIN: "venova-audio-stream-windows-amd64.exe"
  SOURCE_FILE: "cmd/${CI_PROJECT_NAME}/main.go"
  AUDIO_SOURCE_FILE: "cmd/audio-stream/main.go"

tag:
  stage: tag
  image: "golang:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - |
      if [ -n "$ADDITIONAL_CA_CERT_BUNDLE" ]; then
        echo "$ADDITIONAL_CA_CERT_BUNDLE" > /usr/local/share/ca-certificates/additional-ca.crt
        update-ca-certificates
      fi
  script:
    - "go install github.com/caarlos0/svu@latest"
    - "git fetch --tags"
    - "NEXT=$(svu next)"
    - "echo \"next tag: ${NEXT}\""
    - |
      if git rev-parse "$NEXT" >/dev/null 2>&1; then
        echo "tag $NEXT already exists, skipping"
      else
        git tag "$NEXT"
        git push "https://gitlab-ci-token:${GITPUSH}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$NEXT"
      fi

lint:
  image: "golang:latest"
  stage: "lint"
  script:
    - "curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.12.2"
    - "golangci-lint --version"
    - "golangci-lint run"

build:
  image: "golang:latest"
  stage: build
  script:
    - "export GOMODCACHE=$(pwd)/go-mod-cache"
    - "export GOCACHE=$(pwd)/go-cache"
    - "export CGO_ENABLED=0"
# Windows
    - |
      GOOS=windows GOARCH=amd64 go build \
      -ldflags "\
      -X 'github.com/braydencw1/venova.NAME=venova' \
      -X 'github.com/braydencw1/venova.VERSION=${CI_COMMIT_TAG}' \
      -X 'github.com/braydencw1/venova.REVISION=${CI_COMMIT_SHORT_SHA}' \
      -X 'github.com/braydencw1/venova.REFERENCE=${CI_COMMIT_REF_NAME}' \
      -X 'github.com/braydencw1/venova.BUILT=${CI_PIPELINE_CREATED_AT}'" \
      -o ${OUTPUT_WIN} ${SOURCE_FILE}
# Audio Windows
    - |
      GOOS=windows GOARCH=amd64 go build \
      -ldflags "\
      -X 'github.com/braydencw1/venova.NAME=venova-audio-stream' \
      -X 'github.com/braydencw1/venova.VERSION=${CI_COMMIT_TAG}' \
      -X 'github.com/braydencw1/venova.REVISION=${CI_COMMIT_SHORT_SHA}' \
      -X 'github.com/braydencw1/venova.REFERENCE=${CI_COMMIT_REF_NAME}' \
      -X 'github.com/braydencw1/venova.BUILT=${CI_PIPELINE_CREATED_AT}'" \
      -o ${OUTPUT_AUDIO_WIN} ${AUDIO_SOURCE_FILE}
# Linux
    - |
      GOOS=linux GOARCH=amd64 go build \
      -ldflags "\
      -X 'github.com/braydencw1/venova.NAME=venova' \
      -X 'github.com/braydencw1/venova.VERSION=${CI_COMMIT_TAG}' \
      -X 'github.com/braydencw1/venova.REVISION=${CI_COMMIT_SHORT_SHA}' \
      -X 'github.com/braydencw1/venova.REFERENCE=${CI_COMMIT_REF_NAME}' \
      -X 'github.com/braydencw1/venova.BUILT=${CI_PIPELINE_CREATED_AT}'" \
      -o ${OUTPUT} ${SOURCE_FILE}
    - ./${OUTPUT} version
# Audio Linux
    - |
      GOOS=linux GOARCH=amd64 go build \
      -ldflags "\
      -X 'github.com/braydencw1/venova.NAME=venova-audio-stream' \
      -X 'github.com/braydencw1/venova.VERSION=${CI_COMMIT_TAG}' \
      -X 'github.com/braydencw1/venova.REVISION=${CI_COMMIT_SHORT_SHA}' \
      -X 'github.com/braydencw1/venova.REFERENCE=${CI_COMMIT_REF_NAME}' \
      -X 'github.com/braydencw1/venova.BUILT=${CI_PIPELINE_CREATED_AT}'" \
      -o ${OUTPUT_AUDIO} ${AUDIO_SOURCE_FILE}
    - ./${OUTPUT_AUDIO} version
  artifacts:
    paths:
      - "${OUTPUT}"
      - "${OUTPUT_WIN}"
      - "${OUTPUT_AUDIO}"
      - "${OUTPUT_AUDIO_WIN}"
  only:
    - tags

build-image:
  stage: build_image
  image: quay.io/podman/stable
  needs:
    - job: build
      artifacts: true
  variables:
    IMAGE: "$PODMAN_REGISTRY/venova"
  before_script:
    - |
      if [ -n "$ADDITIONAL_CA_CERT_BUNDLE" ]; then
        echo "$ADDITIONAL_CA_CERT_BUNDLE" > /tmp/additional-ca.crt

        # Trust for system tools inside the job container
        cp /tmp/additional-ca.crt /etc/pki/ca-trust/source/anchors/additional-ca.crt
        update-ca-trust

        # Trust for Podman/containers registry access
        mkdir -p "/etc/containers/certs.d/$PODMAN_REGISTRY"
        cp /tmp/additional-ca.crt "/etc/containers/certs.d/$PODMAN_REGISTRY/ca.crt"
      fi
    # DOCKER_AUTH_CONFIG (set at the runner/project level) overrides CLI
    # login; unset it so these credentials actually apply to the push.
    - unset DOCKER_AUTH_CONFIG
    - ls -l /run/user/1001/podman/podman.sock
    - podman info
    - echo "$NEXUS_PASS" | podman login -u "$NEXUS_USER" --password-stdin "$PODMAN_REGISTRY"
  script:
    - podman build
      -t "$IMAGE:latest"
      -t "$IMAGE:$CI_COMMIT_TAG"
      .
    - podman push "$IMAGE:latest"
    - podman push "$IMAGE:$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG

upload_nexus:
  image: "golang:latest"
  stage: upload_nexus
  script:
    - "curl -u ${NEXUS_USER}:${NEXUS_PASS} -k --upload-file ${OUTPUT} ${NEXUS_URL}${REPO_SUB_URL}/venova/linux/v${CI_COMMIT_TAG}/${OUTPUT}"
    - "curl -u ${NEXUS_USER}:${NEXUS_PASS} -k --upload-file ${OUTPUT_WIN} ${NEXUS_URL}${REPO_SUB_URL}/venova/windows/v${CI_COMMIT_TAG}/${OUTPUT_WIN}"
    - "curl -u ${NEXUS_USER}:${NEXUS_PASS} -k --upload-file ${OUTPUT_AUDIO} ${NEXUS_URL}${REPO_SUB_URL}/venova-audio-stream/linux/v${CI_COMMIT_TAG}/${OUTPUT_AUDIO}"
    - "curl -u ${NEXUS_USER}:${NEXUS_PASS} -k --upload-file ${OUTPUT_AUDIO_WIN} ${NEXUS_URL}${REPO_SUB_URL}/venova-audio-stream/windows/v${CI_COMMIT_TAG}/${OUTPUT_AUDIO_WIN}"
  artifacts:
    paths:
      - "${OUTPUT}"
      - "${OUTPUT_WIN}"
      - "${OUTPUT_AUDIO}"
      - "${OUTPUT_AUDIO_WIN}"
  only:
    - tags


release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG       
  artifacts:
    paths:
      - "${OUTPUT}"
      - "${OUTPUT_WIN}"
      - "${OUTPUT_AUDIO}"
      - "${OUTPUT_AUDIO_WIN}"
  script:
    - echo "running release_job"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: '$CI_COMMIT_TAG'
    name: 'Release v$CI_COMMIT_TAG'
    assets:
      links:
        - name: "${OUTPUT}"
          url: "${CI_JOB_URL}/artifacts/file/${OUTPUT}"
        - name: "${OUTPUT_WIN}"
          url: "${CI_JOB_URL}/artifacts/file/${OUTPUT_WIN}"
        - name: "${OUTPUT_AUDIO}"
          url: "${CI_JOB_URL}/artifacts/file/${OUTPUT_AUDIO}"
        - name: "${OUTPUT_AUDIO_WIN}"
          url: "${CI_JOB_URL}/artifacts/file/${OUTPUT_AUDIO_WIN}"
